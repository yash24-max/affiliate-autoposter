server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false   # Routes defined programmatically in RouteConfig
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

jwt:
  secret: ${JWT_SECRET:ec8f6db42ad249867086afd13e35138d68af4809835fed8236693add84d81ea9}
